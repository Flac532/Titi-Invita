<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Colaborador - Titi Invita</title>
    <link rel="stylesheet" href="titi-design.css">
    <link rel="stylesheet" href="cliente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Bloquear mover mesas */
        .mesa { cursor:not-allowed !important; }
        .overlay-bloqueado {
            position:fixed; inset:0;
            background:rgba(26,16,53,.4); display:none;
            align-items:center; justify-content:center;
            z-index:10000; backdrop-filter:blur(4px);
        }
        .overlay-bloqueado.active { display:flex; }
        .mensaje-bloqueado {
            background:var(--titi-white,#fff); padding:36px;
            border-radius:20px; text-align:center;
            max-width:400px; box-shadow:0 16px 48px rgba(27,16,55,.14);
        }
    </style>
    <script>
        window.MODO_COLABORADOR = true;
        window.SOLO_INVITADOS = true;

        document.addEventListener('DOMContentLoaded', function() {
            const usuario = JSON.parse(localStorage.getItem('titi_usuario_actual') || '{}');
            if (usuario.rol !== 'colaborador') {
                alert('Esta página es solo para colaboradores');
                window.location.href = 'index.html';
                return;
            }
            setTimeout(() => {
                document.querySelectorAll('.mesa').forEach(mesa => {
                    mesa.draggable = false;
                    mesa.style.cursor = 'default';
                    mesa.ondragstart = (e) => { e.preventDefault(); mostrarMensajeBloqueado(); return false; };
                });
                ['btnAgregarMesa','btnEliminarMesa','btnEditarMesa','btnGuardarConfig'].forEach(id => {
                    const btn = document.getElementById(id);
                    if (btn) btn.style.display = 'none';
                });
                const header = document.querySelector('.top-bar h1');
                if (header) header.innerHTML += ' <span style="font-size:.55em; color:var(--titi-ash,#999); font-weight:400">(Solo agregar invitados)</span>';
            }, 1000);
        });

        function mostrarMensajeBloqueado() {
            const overlay = document.createElement('div');
            overlay.className = 'overlay-bloqueado active';
            overlay.innerHTML = `
                <div class="mensaje-bloqueado">
                    <div style="width:64px; height:64px; margin:0 auto 20px; background:var(--titi-fog,#eee); border-radius:50%; display:flex; align-items:center; justify-content:center">
                        <i class="fas fa-lock" style="font-size:1.8rem; color:var(--titi-ash,#999)"></i>
                    </div>
                    <h3 style="font-family:'Playfair Display',serif; margin-bottom:8px; color:#1A1035">Función Bloqueada</h3>
                    <p style="color:#6B6580; margin-bottom:24px; font-size:.92rem">Como colaborador, solo puedes agregar y asignar invitados. No puedes modificar la configuración de mesas.</p>
                    <button onclick="this.closest('.overlay-bloqueado').remove()" style="padding:12px 28px; background:linear-gradient(135deg,#667eea,#5B2D8E); color:#fff; border:none; border-radius:50px; cursor:pointer; font-weight:600; font-size:.92rem">
                        Entendido
                    </button>
                </div>`;
            document.body.appendChild(overlay);
        }
    </script>
</head>
<body>
    <script>
        fetch('cliente.html')
            .then(r => r.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const body = doc.querySelector('body');
                document.body.innerHTML = body.innerHTML;
                setTimeout(() => {
                    document.querySelectorAll('.mesa').forEach(mesa => { mesa.draggable = false; });
                }, 2000);
            });
    </script>
</body>
</html>
