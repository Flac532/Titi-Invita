<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titi Invita - Cargando...</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh;
            background:linear-gradient(160deg, #667eea 0%, #5B2D8E 45%, #3E1D63 100%);
            font-family:'DM Sans', system-ui, sans-serif;
        }
        .loader { text-align:center; color:#fff; }
        .spinner {
            width:52px; height:52px;
            border:4px solid rgba(255,255,255,.2);
            border-top-color:#fff; border-radius:50%;
            animation:spin .8s linear infinite;
            margin:0 auto 24px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        h2 { font-family:'Playfair Display', serif; font-size:1.6rem; font-weight:600; letter-spacing:.3px; }
        p { margin:10px 0 0; opacity:.7; font-size:.92rem; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>Titi Invita</h2>
        <p id="status">Redirigiendo...</p>
    </div>
    <script>
        const usuarioStr = localStorage.getItem('titi_usuario_actual') || sessionStorage.getItem('titi_usuario_actual');
        const token = localStorage.getItem('titi_token') || sessionStorage.getItem('titi_token');

        if (!usuarioStr || !token) {
            document.getElementById('status').textContent = 'No has iniciado sesión...';
            setTimeout(() => { window.location.href = 'login.html'; }, 1000);
        } else {
            try {
                const usuario = JSON.parse(usuarioStr);
                let destino = 'login.html', mensaje = 'Redirigiendo...';
                switch(usuario.rol) {
                    case 'admin':        destino = 'admin.html';        mensaje = 'Bienvenido Admin...'; break;
                    case 'organizador':  destino = 'organizador.html';  mensaje = 'Bienvenido Organizador...'; break;
                    case 'cliente':      destino = 'cliente.html';      mensaje = 'Bienvenido Cliente...'; break;
                    case 'colaborador':  destino = 'cliente.html';       mensaje = 'Bienvenido Colaborador...'; break;
                    default:             destino = 'login.html';        mensaje = 'Rol desconocido...';
                }
                document.getElementById('status').textContent = mensaje;
                setTimeout(() => { window.location.href = destino; }, 500);
            } catch (error) {
                document.getElementById('status').textContent = 'Error de sesión...';
                localStorage.clear(); sessionStorage.clear();
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            }
        }
    </script>
</body>
</html>
